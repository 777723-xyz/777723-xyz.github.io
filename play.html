<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="theme-color" content="#17100a" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https:; frame-src https:; base-uri 'self'; form-action 'none'" />
    <title>正在加载游戏 · Web RPG</title>
    <style>
      :root{color-scheme:dark;--ink:#28180e;--paper:#fff1c9;--green:#2e765f;--orange:#d78a32;--blue:#345e7f}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#17100a;color:var(--paper);font-family:"SFMono-Regular",Consolas,"PingFang SC","Microsoft YaHei",monospace}#game{position:fixed;inset:0;width:100%;height:100%;border:0;background:#17100a}.toolbar{position:fixed;z-index:10;top:10px;right:10px;display:flex;gap:8px}.toolbar a{display:inline-flex;min-height:38px;align-items:center;border:3px solid var(--ink);padding:8px 11px;background:var(--blue);color:#fff8df;box-shadow:4px 4px 0 var(--ink);font-size:12px;font-weight:800;text-decoration:none}.toolbar a:first-child{background:var(--orange);color:var(--ink)}.modal{position:fixed;z-index:20;inset:0;display:grid;place-items:center;padding:20px;background:rgb(0 0 0/.72)}.modal[hidden]{display:none}.dialog{width:min(460px,100%);border:4px solid var(--ink);padding:24px;background:var(--paper);color:var(--ink);box-shadow:9px 9px 0 rgb(0 0 0/.8);text-align:center}.dialog h1{margin:0 0 14px;font-size:1.2rem}.dialog p{margin:0;line-height:1.8}.dialog a,.dialog button{display:flex;width:100%;min-height:44px;align-items:center;justify-content:center;border:3px solid var(--ink);border-radius:0;margin-top:16px;padding:10px 14px;box-shadow:4px 4px 0 var(--ink);font:inherit;font-weight:900}.dialog a{background:var(--green);color:#fff8df;text-decoration:none}.dialog button{background:var(--orange);color:var(--ink);cursor:pointer}.dialog button:disabled{filter:grayscale(.8);cursor:not-allowed}.error{display:grid;min-height:100%;place-items:center;padding:28px;text-align:center}.error-box{width:min(620px,100%);border:4px solid var(--ink);padding:24px;background:var(--paper);color:var(--ink);box-shadow:8px 8px 0 #000}.error-box a{color:var(--blue);font-weight:800}@media(max-width:560px){.toolbar{right:7px;top:7px}.toolbar a{padding:7px 9px}.dialog{padding:20px}}
    </style>
  </head>
  <body>
    <iframe id="game" title="游戏内容" referrerpolicy="no-referrer" allow="fullscreen; autoplay; gamepad" allowfullscreen></iframe>
    <nav class="toolbar" aria-label="游戏快捷操作">
      <a href="/" aria-label="返回游戏目录">目录</a>
      <a id="acquire" href="https://777723.xyz" target="_blank" rel="noopener noreferrer sponsored">获取</a>
    </nav>
    <section id="ad-modal" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="ad-title">
      <div class="dialog">
        <h1 id="ad-title">游戏提示</h1>
        <p id="ad-text"></p>
        <a id="ad-link" href="https://777723.xyz" target="_blank" rel="noopener noreferrer sponsored">立即查看</a>
        <button id="ad-close" type="button" disabled>关闭</button>
      </div>
    </section>
    <script src="/play.js"></script>
  </body>
</html>
