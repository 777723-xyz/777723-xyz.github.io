    <style>
      :root{color-scheme:dark;--ink:#28180e;--paper:#fff1c9;--green:#2e765f;--orange:#d78a32;--blue:#345e7f}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#17100a;color:var(--paper);font-family:"SFMono-Regular",Consolas,"PingFang SC","Microsoft YaHei",monospace}#game{position:fixed;inset:0;width:100%;height:100%;border:0;background:#17100a}.toolbar{position:fixed;z-index:10;top:max(10px,env(safe-area-inset-top));right:max(10px,env(safe-area-inset-right));display:flex;gap:8px}.toolbar a{display:inline-flex;min-height:38px;align-items:center;border:3px solid var(--ink);padding:8px 11px;background:var(--blue);color:#fff8df;box-shadow:4px 4px 0 var(--ink);font-size:12px;font-weight:800;text-decoration:none}.toolbar a:first-child{background:var(--orange);color:var(--ink)}.game-top-ad{position:fixed;z-index:9;top:max(10px,env(safe-area-inset-top));left:50%;display:block;width:min(620px,calc(100% - 250px));overflow:hidden;border:1px solid rgb(255 241 201/.68);padding:8px 14px;background:rgb(40 24 14/.7);color:#fff8df;font-size:12px;font-weight:800;line-height:1.35;text-align:center;text-decoration:none;text-overflow:ellipsis;white-space:nowrap;transform:translateX(-50%)}.game-top-ad[hidden]{display:none}.modal{position:fixed;z-index:20;inset:0;display:grid;place-items:center;padding:20px;background:rgb(0 0 0/.72)}.modal[hidden]{display:none}.dialog{width:min(460px,100%);border:4px solid var(--ink);padding:24px;background:var(--paper);color:var(--ink);box-shadow:9px 9px 0 rgb(0 0 0/.8);text-align:center}.dialog h1{margin:0 0 14px;font-size:1.2rem}.dialog p{margin:0;line-height:1.8}.dialog a,.dialog button{display:flex;width:100%;min-height:44px;align-items:center;justify-content:center;border:3px solid var(--ink);border-radius:0;margin-top:16px;padding:10px 14px;box-shadow:4px 4px 0 var(--ink);font:inherit;font-weight:900}.dialog a{background:var(--green);color:#fff8df;text-decoration:none}.dialog button{background:var(--orange);color:var(--ink);cursor:pointer}.dialog button:disabled{filter:grayscale(.8);cursor:not-allowed}.error{display:grid;min-height:100%;place-items:center;padding:28px;text-align:center}.error-box{width:min(620px,100%);border:4px solid var(--ink);padding:24px;background:var(--paper);color:var(--ink);box-shadow:8px 8px 0 #000}.error-box a{color:var(--blue);font-weight:800}@media(max-width:560px){.toolbar{top:max(7px,env(safe-area-inset-top));right:max(7px,env(safe-area-inset-right));gap:5px}.toolbar a{min-height:34px;padding:6px 8px}.game-top-ad{top:calc(max(7px,env(safe-area-inset-top)) + 42px);left:max(7px,env(safe-area-inset-left));width:calc(100% - max(14px,env(safe-area-inset-left) + env(safe-area-inset-right)));padding:6px 10px;font-size:11px;transform:none}.dialog{padding:20px}}@media(orientation:landscape) and (max-height:560px){.toolbar a{min-height:30px;padding:4px 7px}.game-top-ad{top:max(7px,env(safe-area-inset-top));right:120px;left:max(7px,env(safe-area-inset-left));width:auto;padding:5px 8px;transform:none}}
