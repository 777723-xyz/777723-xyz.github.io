<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="777723.xyz 网页 RPG 游戏目录" />
    <meta name="color-scheme" content="dark" />
    <title>777723.xyz · 网页 RPG</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="site-shell">
      <header class="hero">
        <p class="eyebrow">777723.xyz</p>
        <h1>网页 RPG 游戏目录</h1>
        <p class="subtitle">仅显示已通过结构校验并发布到本站 Pages 的游戏。</p>
      </header>

      <section class="controls" aria-label="搜索游戏">
        <label class="search-label" for="search">搜索标题、作者或仓库名</label>
        <input id="search" type="search" autocomplete="off" placeholder="输入游戏名、作者或仓库名" />
        <p id="catalog-status" class="catalog-status" role="status">正在读取游戏目录…</p>
      </section>

      <section id="catalog" class="catalog" aria-live="polite"></section>
    </main>

    <template id="game-card-template">
      <article class="game-card">
        <img class="cover" alt="" loading="lazy" decoding="async" />
        <div class="game-copy">
          <h2></h2>
          <p class="repo"></p>
          <p class="meta"></p>
          <div class="actions">
            <a class="play" target="_blank" rel="noopener noreferrer">开始游戏</a>
            <a class="source" target="_blank" rel="noopener noreferrer">源码</a>
          </div>
        </div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
