name: Deploy public game catalog

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [catalog-updated]
  schedule:
    # Backup deployment only; normal deploys are dispatched after a verified
    # catalog metadata change.
    - cron: "55 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: public-catalog-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Sync configured portal metadata
        run: node scripts/sync-portal-meta.mjs
      - name: Validate portal configuration
        run: node scripts/validate-portal.mjs
      - name: Build reachable game catalog
        run: node scripts/build-catalog.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
